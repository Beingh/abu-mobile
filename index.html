  <style>
    /* ── Wrapper ── */
    /* Arrow buttons are 32px wide each side */
    /* .carousel-section { position: relative; padding: 0 36px; } */

.carousel-section { position: relative; padding: 0; }
    /* ── Scroll container ── */
    .product-scroll {
      display: flex;
      overflow-x: auto;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 10px;
      /* Snap to card boundaries so touch-swipe doesn't free-scroll */
      scroll-snap-type: x mandatory;
    }
    .product-scroll::-webkit-scrollbar { display: none; }

    /* Every card is a snap point */
    .product-card { scroll-snap-align: start; }

    /* ── Card widths ──
       Mobile (<576px)  → exactly 2 cards: (100% - 1 gap) / 2
       Tablet (576-991) → 3 cards
       Desktop (≥992px) → exactly 4 cards
       We use the scroll container width (100%) minus total gaps, divided by count.
       Since padding-x on .carousel-section is 36px each side (72px total),
       the scroll area = 100vw - 72px - container padding.
       Safest approach: use px-based container padding + calc with vw.
    */
    .product-card {
      /* 2 cards on mobile: (scrollWidth - 1 gap) / 2
         scrollWidth ≈ 100vw - 72px (arrows) - 24px (container px-3) = 100vw - 96px
         card = (100vw - 96px - 10px) / 2                                          */
      flex: 0 0 calc((100vw - 106px) / 2);
      text-decoration: none;
      color: #111;
    }
    @media (min-width: 576px) {
      /* 3 cards: (100vw - 96px - 20px gap) / 3 */
      .product-card { flex: 0 0 calc((100vw - 116px) / 3); }
    }
    @media (min-width: 992px) {
      /* 4 cards exactly — container is max 1320px on xxl but we use 100% of scroll area */
      .product-card { flex: 0 0 calc((100% - 30px) / 4); }
      .product-scroll { gap: 10px; }
    }

    /* ── Card image ── */
    .product-card .card { 
        height: 100%;
      border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
    .product-card .card-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 75%;   /* reduced from 100% to 75% — frees space for title */
      overflow: hidden;
      background: #f5f5f5;
    }
    .product-card .card-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.25s;
    }
    .product-card:hover .card-img-wrap img { transform: scale(1.04); }

    /* overlay buttons on hover */
    .product-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .product-card:hover .product-overlay { opacity: 1; }

    /* ── Card title ── */
    .product-card .card-body {
    padding: 6px 8px 10px;
    text-align: center;;
    }
    .product-card .card-title {
  font-size: 0.95rem;
  font-weight: 700;
  margin: 0;
  text-align: center;

  height: 24px;
  line-height: 24px;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
    @media (min-width: 992px) {
      .product-card .card-body  { padding: 8px 10px 10px; }
      .product-card .card-title { font-size: 1.05rem; }   /* bigger on desktop */
    }

    /* ── Arrow buttons ── */
    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-60%);
      z-index: 10;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      padding: 0;
    }
    @media (min-width: 992px) { .arrow-btn { width: 38px; height: 38px; } }
    .arrow-btn:hover { background: #f0f0f0; box-shadow: 0 3px 12px rgba(0,0,0,0.3); }
    .arrow-btn svg { width: 14px; height: 14px; }
    @media (min-width: 992px) { .arrow-btn svg { width: 20px; height: 20px; } }
    .arrow-btn.left  { left:  0; }
    .arrow-btn.right { right: 0; }
    .arrow-btn:disabled { opacity: 0.3; cursor: default; }

    /* Section title */
    .section-heading { font-size: 1.2rem; font-weight: 700; color: #111; }
    @media (min-width: 992px) { .section-heading { font-size: 1.4rem; } }

<!-- ============================================================
     JAVASCRIPT — ONE BLOCK ONLY — handles ALL rows above
     DO NOT copy or repeat this script for new rows
     DO NOT add id attributes to arrow buttons or scroll divs
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function scrollAmount(scroll) {
    const card = scroll.querySelector('.product-card');
    const cardW = card ? card.offsetWidth : 160;
    const gap = 10;
    if (window.innerWidth >= 992) return scroll.clientWidth;
    if (window.innerWidth >= 576) return (cardW + gap) * 3;
    return (cardW + gap) * 2;
  }

  function updateArrows(scroll) {
    const section = scroll.closest('.carousel-section');
    section.querySelector('.arrow-btn.left').disabled  = scroll.scrollLeft <= 0;
    section.querySelector('.arrow-btn.right').disabled = scroll.scrollLeft + scroll.clientWidth >= scroll.scrollWidth - 2;
  }

  /* Automatically wires up every .carousel-section on the page */
  document.querySelectorAll('.carousel-section').forEach(section => {
    const scroll   = section.querySelector('.product-scroll');
    const btnLeft  = section.querySelector('.arrow-btn.left');
    const btnRight = section.querySelector('.arrow-btn.right');

    btnLeft.addEventListener('click', () => {
      scroll.scrollBy({ left: -scrollAmount(scroll), behavior: 'smooth' });
    });

    btnRight.addEventListener('click', () => {
      scroll.scrollBy({ left: scrollAmount(scroll), behavior: 'smooth' });
    });

    scroll.addEventListener('scroll', () => updateArrows(scroll), { passive: true });
    updateArrows(scroll);

    let touchStartX = 0;
    let touchStartScroll = 0;

    scroll.addEventListener('touchstart', e => {
      touchStartX      = e.touches[0].clientX;
      touchStartScroll = scroll.scrollLeft;
      scroll.style.scrollSnapType = 'none';
    }, { passive: true });

    scroll.addEventListener('touchend', e => {
      const deltaX = touchStartX - e.changedTouches[0].clientX;
      scroll.style.scrollSnapType = '';
      if (Math.abs(deltaX) > 40) {
        const target = deltaX > 0
          ? touchStartScroll + scrollAmount(scroll)
          : touchStartScroll - scrollAmount(scroll);
        scroll.scrollTo({ left: target, behavior: 'smooth' });
      } else {
        scroll.scrollTo({ left: touchStartScroll, behavior: 'smooth' });
      }
    }, { passive: true });
  });

  window.addEventListener('resize', () => {
    document.querySelectorAll('.product-scroll').forEach(updateArrows);
  });
</script>
