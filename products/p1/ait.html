<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ========================================= */
/* Desktop styles */
/* ========================================= */

.gallery-thumbnails{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.gallery-thumb{
    border:none;
    background:none;
    padding:0;
    margin:0;
    width:100%;
    cursor:pointer;
}

.gallery-thumb-img{
    width:100%;
    height:80px;
    object-fit:contain;
    display:block;
    max-width:100%;
    border:2px solid transparent;
    border-radius:10px;
    transition:.3s;
}

.gallery-thumb.active .gallery-thumb-img{
    border-color:#0d6efd;
}

.main-image-container{
    width:100%;
    height:90vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:12px;
    background:white;
    aspect-ratio:4/3;
}

.main-image{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* ========================================= */
/* Mobile styles */
/* ========================================= */

@media (max-width:767.98px){

.desktop-section{
    display:none;
}

.carousel-row{
    height:auto;
}

.mobile-product-carousel{
    width:100%;
}

.mobile-product-carousel .carousel-inner{
    width:100%;
}

.mobile-product-carousel .carousel-item{
    height:auto;
}

.carousel-image-wrapper{
    width:100%;
    aspect-ratio:4/3;

    display:flex;
    justify-content:center;
    align-items:center;
}

.carousel-image{
    width:100%;
    height:100%;
    object-fit:contain;
}

.carousel-indicators{
    position:relative;
    margin-top:10px;
    margin-bottom:0;
    bottom:auto;
}

.carousel-indicators [data-bs-target]{
    width:10px;
    height:10px;
    border-radius:50%;
    background:red;
}

.carousel-indicators .active{
    background:red;
}

}

/* ========================================= */
/* Hide mobile section on desktop */
/* ========================================= */

@media (min-width:768px){

.mobile-section{
    display:none;
}

}

</style>
</head>

<body>

<!-- ========================================= -->
<!-- Desktop / Tablet Layout -->
<!-- ========================================= -->

<div class="container-fluid desktop-section mt-5">

    <div class="row border border-danger">

        <!-- Thumbnails -->
        <div class="col-md-1">

            <div class="gallery-thumbnails">

                <button class="gallery-thumb active"
                        data-image="u30.1.png">

                    <img src="u30.1.png"
                         class="gallery-thumb-img">

                </button>

                <button class="gallery-thumb"
                        data-image="u30.png">

                    <img src="u30.png"
                         class="gallery-thumb-img">

                </button>

            </div>

        </div>

        <!-- Main Image -->
        <div class="col-md-6 border border-danger">

            <div class="main-image-container">

                <img src="u30.1.png"
                     id="mainProductImage"
                     class="main-image">

            </div>

        </div>

        <!-- Right Side -->
        <div class="col-md-5 border border-primary">

            <div class="row h-100">

                <div class="col-12">

                    <table class="table table-sm table-bordered">

                        <thead class="table-primary">
                            <tr>
                                <th>Feature</th>
                                <th>Value</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td>Brand</td>
                                <td>KDM</td>
                            </tr>

                            <tr>
                                <td>Type</td>
                                <td>C-Type</td>
                            </tr>

                            <tr>
                                <td>Model</td>
                                <td>U-30</td>
                            </tr>

                            <tr>
                                <td>Power Rating</td>
                                <td>18W</td>
                            </tr>

                            <tr>
                                <td>Data Transfer</td>
                                <td>No</td>
                            </tr>

                            <tr>
                                <td>Color Available</td>
                                <td>White</td>
                            </tr>

                            <tr class="table-danger">
                                <td>Units in Stock</td>
                                <td>2</td>
                            </tr>

                            <tr class="table-danger">
                                <td>Product Code</td>
                                <td>U-30</td>
                            </tr>

                        </tbody>

                    </table>

                </div>

                <div class="col-12 d-md-flex flex-md-column justify-content-md-between gap-md-2">

                    <a href="https://wa.me/918237256620?text=Hello,%20I%20would%20like%20to%20place%20an%20order.%0A%0AProduct%20Code:%20U-30%0AQuantity:%201"
                       class="btn btn-warning w-100"
                       target="_blank">

                       Order On WhatsApp

                    </a>

                    <a href="#cart"
                       class="btn btn-success w-100">

                       Go To Categories

                    </a>

                    <a href="#wishlist"
                       class="btn btn-danger w-100">

                       Back To Home

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>


<!-- ========================================= -->
<!-- Mobile Layout -->
<!-- ========================================= -->

<div class="container-fluid mobile-section px-0">

    <div class="row carousel-row m-0">

        <div class="col-12 p-0">

            <div id="productCarousel"
                 class="carousel slide mobile-product-carousel"
                 data-bs-ride="carousel">

                <div class="carousel-indicators">

                    <button type="button"
                            data-bs-target="#productCarousel"
                            data-bs-slide-to="0"
                            class="active">
                    </button>

                    <button type="button"
                            data-bs-target="#productCarousel"
                            data-bs-slide-to="1">
                    </button>

                </div>

                <div class="carousel-inner">

                    <div class="carousel-item active">

                        <div class="carousel-image-wrapper">

                            <img src="u30.1.png"
                                 class="carousel-image">

                        </div>

                    </div>

                    <div class="carousel-item">

                        <div class="carousel-image-wrapper">

                            <img src="u30.png"
                                 class="carousel-image">

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
<!-- Mobile only: Product details section -->

<div class="row mt-3 mx-0">

    <!-- Left side : Table -->

    <div class="col-6">

        <table class="table table-sm table-bordered">

            <thead class="table-primary">

                <tr>
                    <th>Feature</th>
                    <th>Value</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>Brand</td>
                    <td>KDM</td>
                </tr>

                <tr>
                    <td>Type</td>
                    <td>C-Type</td>
                </tr>

                <tr>
                    <td>Model</td>
                    <td>U-30</td>
                </tr>

                <tr>
                    <td>Power</td>
                    <td>18W</td>
                </tr>

                <tr class="table-danger">
                    <td>Stock</td>
                    <td>2</td>
                </tr>

            </tbody>

        </table>

    </div>


    <!-- Right side : Buttons -->

    <div class="col-6">

        <div class="d-flex flex-column justify-content-between h-100 gap-2">

            <a href="https://wa.me/918237256620?text=Hello,%20I%20want%20to%20order%20Product%20Code:%20U-30"
               class="btn btn-warning w-100"
               target="_blank">

                Order on WhatsApp

            </a>

            <a href="#categories"
               class="btn btn-success w-100">

                Go To Categories

            </a>

            <a href="#home"
               class="btn btn-danger w-100">

                Back To Home

            </a>

        </div>

    </div>

</div>
</div>


<script>

const thumbnails=
document.querySelectorAll(".gallery-thumb");

const mainImage=
document.getElementById("mainProductImage");

thumbnails.forEach(button=>{

button.addEventListener("click",()=>{

mainImage.src=
button.dataset.image;

thumbnails.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

});

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
